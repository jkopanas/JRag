services:
  ragserver:
    tty: true
    depends_on:
      - dbrag
    build:
      context: ./packages/server
      dockerfile: ./Dockerfile-development
    command: ['yarn', 'coko-server', 'start-dev']
    networks:
      - devnet
    ports:
      - ${SERVER_PORT:-3000}:${SERVER_PORT:-3000}
    environment:
      - NODE_ENV=development
      - SECRET=${SECRET:-secret}
      - SERVER_PORT=${SERVER_PORT:-3000}
      - CLIENT_URL=http://localhost:4000
      - POSTGRES_HOST=${POSTGRES_HOST:-dbrag}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-rag}
      - POSTGRES_USER=${POSTGRES_USER:-rag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-password}
      - S3_URL=${S3_URL:-http://fileHostingRag:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-nonRootUser}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-nonRootPassword}
      - S3_BUCKET=${S3_BUCKET:-uploads}
      - S3_REGION=${S3_REGION}
      - OPEN_AI_API_KEY=${OPEN_AI_API_KEY}
    volumes:
      - ./packages/server/api:/home/node/app/api
      - ./packages/server/config:/home/node/app/config
      - ./packages/server/controllers:/home/node/app/controllers
      - ./packages/server/models:/home/node/app/models
      - ./packages/server/services:/home/node/app/services

  dbrag:
    build:
      context: ./packages/server
      dockerfile: ./Dockerfile-postgres
    networks:
      - devnet
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rag}
      - POSTGRES_USER=${POSTGRES_USER:-rag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}

  fileHostingRag:
    image: minio/minio:RELEASE.2023-05-04T21-44-30Z
    ports:
      - ${S3_PORT:-9000}:9000
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    networks:
      - devnet
    volumes:
      - minio_storage:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-superSecretAdminPassword}
    command: server --console-address ":${MINIO_CONSOLE_PORT:-9001}" /data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 0.5s
      timeout: 20s
      retries: 30

  createbucketRag:
    image: minio/mc:RELEASE.2023-05-04T18-10-16Z
    depends_on:
      fileHostingRag:
        condition: service_healthy
    networks:
      - devnet
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add cokoServer http://fileHostingRag:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-superSecretAdminPassword};
      /usr/bin/mc admin user add cokoServer/ ${S3_ACCESS_KEY_ID:-nonRootUser} ${S3_SECRET_ACCESS_KEY:-nonRootPassword};
      /usr/bin/mc admin user enable cokoServer/ ${S3_ACCESS_KEY_ID:-nonRootUser};
      /usr/bin/mc mb cokoServer/${S3_BUCKET:-uploads};
      /usr/bin/mc admin policy attach cokoServer/ readwrite --user=${S3_ACCESS_KEY_ID:-nonRootUser};
      exit 0;
      "

volumes:
  minio_storage:

networks:
  devnet:
    external: true
    name: devnet   # important: same name in both files
